<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E Commerce Front End</title>
    <meta name="description" content="A modern, premium e-commerce shopping experience.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo">E Commerce Front End</div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search premium items...">
                <button aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
            <button class="cart-btn" id="cartOpenBtn" aria-label="Open cart">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Sidebar Filters -->
        <aside class="filters">
            <h2>Categories</h2>
            <div class="filter-group" id="filterContainer">
                <button class="filter-btn active" data-category="all">All Items</button>
                <button class="filter-btn" data-category="electronics">Electronics</button>
                <button class="filter-btn" data-category="wearables">Wearables</button>
                <button class="filter-btn" data-category="accessories">Accessories</button>
            </div>
        </aside>

        <!-- Product Grid -->
        <section class="products">
            <div class="product-grid" id="productGrid">
                <!-- Products injected by JS -->
            </div>
        </section>
    </main>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button class="close-cart" id="cartCloseBtn" aria-label="Close cart">&times;</button>
        </div>
        <div class="cart-items" id="cartItemsContainer">

            <!-- Cart items injected by JS -->
            <div class="empty-cart-msg">Your cart is empty.</div>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotalSum">$0.00</span>
            </div>
            <button class="checkout-btn">Checkout</button>
        </div>
    </div>

    <!-- Script -->
    <script src="app.js"></script>
</body>
</html>
